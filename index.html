<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprimentos - FZ/HC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <header id="mainHeader" style="display:none">
        <div class="brand">
            <i class="ph-fill ph-package"></i>
            <h1>CONTROLE DE NOTAS FISCAIS UN SUPRIMENTOS</h1>
        </div>
        <div class="header-controls">
            <div class="theme-toggle" onclick="toggleTheme()">
                <i id="themeIcon" class="ph ph-moon"></i>
                <span id="themeText">MODO ESCURO</span>
            </div>
            <div class="logout-btn" onclick="logout()">
                <i class="ph ph-sign-out"></i>
                <span>SAIR</span>
            </div>
        </div>
    </header>

    <div id="loginScreen" class="container login-box">
        <i class="ph-fill ph-shield-check" style="font-size: 50px; color: var(--accent)"></i>
        <h2 style="margin: 20px 0 30px">Acesso ao Sistema</h2>
        <input type="text" id="userInput" placeholder="Usuário">
        <input type="password" id="passInput" placeholder="Senha">
        <button class="btn btn-add" style="margin-top:25px" onclick="realizarLogin()">ENTRAR</button>
    </div>

    <div id="app" style="display:none">
        <nav>
            <button class="nav-btn active" id="btn-digitadas" onclick="switchTab('Digitadas')">
                <i class="ph ph-article"></i> NOTAS DIGITADAS
            </button>
            <button class="nav-btn" id="btn-recebimento" onclick="switchTab('Recebimento')">
                <i class="ph ph-truck"></i> NOTAS RECEBIDAS
            </button>
        </nav>

        <main class="container">
            <div class="header-tab">
                <h2 id="tabTitle">Lote de Notas</h2>
                <div class="user-badge">
                    <small>OPERADOR</small><br>
                    <span id="userDisplay"></span>
                </div>
            </div>

            <form id="notaForm">
                <div class="form-grid">
                    <div class="field-group"><label>Número NF</label><input type="text" id="f_nf" placeholder="000.000" required></div>
                    <div class="field-group fg-2"><label>Fornecedor</label><input type="text" id="f_fornecedor" required></div>
                    <div class="field-group">
                        <label>Razão Social</label>
                        <select id="f_razao">
                            <option value="Fundação Zerbini">FZ (Zerbini)</option>
                            <option value="Hospital das Clínicas">HC (Hospital)</option>
                        </select>
                    </div>
                    <div class="field-group"><label>Vencimento</label><input type="date" id="f_vencimento" required></div>
                    <div class="field-group"><label>Emissão</label><input type="date" id="f_data" required></div>
                    <div class="field-group"><label>Valor (R$)</label><input type="number" step="0.01" id="f_valor" required></div>
                    <div class="field-group"><label>Setor Destino</label><input type="text" id="f_setor" placeholder="Ex: Farmácia"></div>
                    <div class="field-group">
                        <label>Possui Lote?</label>
                        <select id="f_lote"><option value="Sim">Sim</option><option value="Não">Não</option></select>
                    </div>

                    <div id="fieldStatus" class="status-card">
                        <div id="statusDigitacaoArea">
                            <div class="status-row">
                                <span class="status-label">Sistema:</span>
                                <div class="radio-group">
                                    <label class="radio-item"><input type="radio" name="gSistema" value="Oracle"> ORACLE</label>
                                    <label class="radio-item"><input type="radio" name="gSistema" value="MV"> MV</label>
                                </div>
                            </div>
                            <div class="status-row" style="margin-top:15px">
                                <span class="status-label">Processo:</span>
                                <div class="radio-group">
                                    <label class="radio-item"><input type="radio" name="gProcesso" value="Manual"> MANUAL</label>
                                    <label class="radio-item"><input type="radio" name="gProcesso" value="Reprocessada"> REPROCESSADA</label>
                                </div>
                            </div>
                        </div>

                        <div id="statusRecebimentoArea" style="display:none">
                            <div class="status-row">
                                <span class="status-label">Logística:</span>
                                <div class="radio-group">
                                    <label class="radio-item"><input type="radio" name="gLogistica" value="Encaminhado ao Setor"> 🚚 ENCAMINHADO</label>
                                    <label class="radio-item"><input type="radio" name="gLogistica" value="Aguardando Retirada"> 📦 AGUARDA RETIRADA</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-add" onclick="adicionarNota()">
                    <i class="ph-bold ph-plus"></i> ADICIONAR AO LOTE
                </button>
            </form>

            <div class="table-container">
                <table id="tabelaDados">
                    <thead>
                        <tr>
                            <th>NF</th>
                            <th>Fornecedor</th>
                            <th>Unidade</th>
                            <th>Vencimento</th>
                            <th>Setor</th>
                            <th>Lote</th>
                            <th id="thStatus">Status</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="actions-footer" id="areaAcoes" style="display:none">
                <button class="btn btn-copy" id="btnCopiar" onclick="copiarProtocolo()">📋 COPIAR PARA E-MAIL</button>
                <button class="btn btn-send" id="btnEnviar" onclick="enviarTudo()">🚀 ENVIAR PARA PLANILHA</button>
            </div>
        </main>
    </div>

    <footer id="mainFooter" style="display:none">
        <p>Desenvolvido por Mateus lima</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
